<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Outreach Tracker</title>

<style>

body{
font-family: Arial, sans-serif;
background:#020617;
color:#e5e7eb;
padding:30px;
}

h1{
margin-bottom:20px;
}

.container{
max-width:900px;
margin:auto;
}

.form{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:20px;
}

input, select{
padding:10px;
border-radius:6px;
border:1px solid #334155;
background:#0f172a;
color:white;
}

button{
padding:10px;
border:none;
background:#00b4d8;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#0096c7;
}

.full{
grid-column:1/3;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

th{
background:#0f172a;
}

.delete{
background:#ef4444;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.delete:hover{
background:#dc2626;
}

/* ===============================
   MOBILE RESPONSIVE
================================ */

@media (max-width: 768px) {
  body {
    padding: 16px;
  }

  .container {
    max-width: 100%;
  }

  h1 {
    font-size: 1.4rem;
    line-height: 1.25;
    margin-bottom: 16px;
  }

  .form {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .full {
    grid-column: auto;
  }

  input,
  select,
  button {
    width: 100%;
    font-size: 16px;
  }

  table {
    display: block;
    overflow-x: auto;
    white-space: nowrap;
    border-collapse: collapse;
  }

  th,
  td {
    min-width: 120px;
    font-size: 0.92rem;
  }

  .delete {
    width: 100%;
    padding: 8px 10px;
  }
}

/* ===============================
   SMALLER PHONES
================================ */

@media (max-width: 480px) {
  body {
    padding: 12px;
  }

  h1 {
    font-size: 1.2rem;
  }

  input,
  select,
  button {
    padding: 12px;
    font-size: 15px;
  }

  th,
  td {
    min-width: 110px;
    padding: 8px;
    font-size: 0.85rem;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>Business Outreach Tracker</h1>

<div class="form">

<input id="business" placeholder="Business Name">

<input id="location" placeholder="Location">

<input id="contact" placeholder="Contact (email / TikTok / name)">

<select id="platform">
<option>Email</option>
<option>TikTok</option>
<option>LinkedIn</option>
<option>Website Form</option>
<option>WhatsApp</option>
</select>

<select id="status">
<option>Message Sent</option>
<option>Waiting Reply</option>
<option>Replied</option>
<option>Follow-up Needed</option>
</select>

<button class="full" onclick="addEntry()">Save Entry</button>

</div>

<table id="table">

<thead>

<tr>
<th>Business</th>
<th>Location</th>
<th>Contact</th>
<th>Platform</th>
<th>Date</th>
<th>Status</th>
<th></th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script>

let entries = JSON.parse(localStorage.getItem("outreachEntries")) || [];

function saveStorage(){
localStorage.setItem("outreachEntries",JSON.stringify(entries));
}

function render(){

let tbody = document.querySelector("#table tbody");
tbody.innerHTML="";

entries.forEach((entry,index)=>{

let row = document.createElement("tr");

row.innerHTML = `
<td>${entry.business}</td>
<td>${entry.location}</td>
<td>${entry.contact}</td>
<td>${entry.platform}</td>
<td>${entry.date}</td>
<td>${entry.status}</td>
<td><button class="delete" onclick="removeEntry(${index})">Delete</button></td>
`;

tbody.appendChild(row);

});

}

function addEntry(){

let business = document.getElementById("business").value.trim();
let location = document.getElementById("location").value.trim();
let contact = document.getElementById("contact").value.trim();
let platform = document.getElementById("platform").value;
let status = document.getElementById("status").value;

if(!business || !contact){
alert("Business and Contact are required");
return;
}

let duplicate = entries.find(e =>
e.business.toLowerCase() === business.toLowerCase() &&
e.contact.toLowerCase() === contact.toLowerCase()
);

if(duplicate){
alert("This business/contact already exists.");
return;
}

let entry = {

business,
location,
contact,
platform,
status,
date:new Date().toLocaleDateString()

};

entries.push(entry);

saveStorage();

render();

document.getElementById("business").value="";
document.getElementById("location").value="";
document.getElementById("contact").value="";

}

function removeEntry(index){

entries.splice(index,1);

saveStorage();

render();

}

render();

</script>

</body>
</html>
